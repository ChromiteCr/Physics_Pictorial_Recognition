# YOLO 数据集配置（力学探究实验版）
# 训练时将 self_captured 和 openclaw 的标注数据合并到 dataset/ 下
# 使用 prepare_dataset.py 脚本完成合并
#
# 设计说明：
#   - 检测类别只保留「块状、对包围盒友好」的器件，保证小数据集下也好检测
#   - 运动轨迹（小车/摆球的位置-时间序列）不在检测类别里，
#     由经典 CV 标记跟踪（颜色色块 + 逐帧定心）提取，见 physics.py track_marker()
#   - 覆盖实验：动量定理、机械能守恒、圆周运动（基础）+ 振动（高级）

path: dataset  # 相对路径，相对本文件(data/dataset.yaml)所在目录解析，换机器不用改

train: images/train
val: images/val
test: images/test

nc: 6
names:
  0: cart            # 小车（动量定理碰撞实验、能量守恒斜面实验）
  1: track           # 导轨/轨道（含斜面，定位与场景分类用）
  2: spring          # 裸弹簧。曾短暂改成 timer 方案又改回——2026-07-13 确认维持
                     # 这个旧方案，spring 类保留，非停用（本轮网页编辑器人工标了
                     # 7 个真实实例，按用户要求保留原样，不是噪声删除）
  3: string          # 细线（摆动、圆周运动用绳）
  4: ruler           # [仅训练，detect.py 不输出] 标定参考尺，实测检测噪声极大
                     # （track/ruler 混淆严重，混淆矩阵显示 track 真实类 0% 被
                     # 正确识别、57% 被误判成 ruler），detect.py 主动过滤掉它的
                     # 检测结果；因此 calibrate() 目前拿不到 ruler 框，px/cm
                     # 标定暂时失效，需要另找标定方式（见 detect.py 顶部说明）
  5: dynamometer     # 弹簧测力计（整个测力仪器，含外壳/刻度/挂钩，区别于裸弹簧）

# [2026-07-11] 删除 pendulum_bob 类：首轮训练验证集里 0 个真实实例，训练集也是
